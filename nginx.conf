# Rate limiting: 10 requests/sec per IP, burst of 20
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self)" always;

    # ── Rate limiting on all requests ──
    limit_req zone=general burst=20 nodelay;
    limit_req_status 429;

    # ── Block common bots/scanners ──
    if ($http_user_agent ~* (scrapy|bot|crawl|slurp|spider|curl|wget)) {
        return 403;
    }

    # ── Block access to hidden files ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Main app ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets with long cache ──
    location ~* \.(css|js|svg|png|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Compression ──
    gzip on;
    gzip_types text/css application/javascript text/html;
    gzip_min_length 256;
}
